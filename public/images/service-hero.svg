<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFE9D9"/>
    </linearGradient>
    <radialGradient id="lite2" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#FFF8E5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF8E5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="g2" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#000" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1600" height="700" fill="url(#bg2)"/>
  <rect width="1600" height="700" fill="url(#lite2)"/>

  <!-- exploded view of cassette unit -->
  <g opacity="0.14" transform="translate(880 200)">
    <rect x="0" y="0" width="320" height="180" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="20" y="20" width="280" height="20" fill="#1A1A1A" opacity="0.6"/>
    <rect x="20" y="60" width="280" height="100" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="20" y1="80" x2="300" y2="80" stroke="#1A1A1A" stroke-width="0.5"/>
    <line x1="20" y1="100" x2="300" y2="100" stroke="#1A1A1A" stroke-width="0.5"/>
    <line x1="20" y1="120" x2="300" y2="120" stroke="#1A1A1A" stroke-width="0.5"/>
    <line x1="20" y1="140" x2="300" y2="140" stroke="#1A1A1A" stroke-width="0.5"/>
    <circle cx="160" cy="220" r="40" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="120" y1="220" x2="200" y2="220" stroke="#1A1A1A" stroke-width="0.5"/>
    <line x1="160" y1="180" x2="160" y2="260" stroke="#1A1A1A" stroke-width="0.5"/>
  </g>

  <!-- piping diagram -->
  <g opacity="0.12" stroke="#1A1A1A" stroke-width="1.5" fill="none">
    <path d="M200 500 L200 420 L400 420 L400 500"/>
    <path d="M260 500 L260 380 L460 380 L460 500"/>
    <circle cx="200" cy="420" r="6"/>
    <circle cx="400" cy="420" r="6"/>
  </g>

  <line x1="120" y1="80" x2="120" y2="640" stroke="#D8D4CC" stroke-width="1"/>
  <line x1="120" y1="640" x2="700" y2="640" stroke="#D8D4CC" stroke-width="1"/>

  <rect width="1600" height="700" fill="url(#g2)"/>
</svg>