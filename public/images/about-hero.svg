<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ECE6D4"/>
    </linearGradient>
    <radialGradient id="lite3" cx="25%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="g3" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#000" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1600" height="700" fill="url(#bg3)"/>

  <!-- abstract architecture: tatami / shoji rhythm -->
  <g opacity="0.10" stroke="#1A1A1A" stroke-width="1" fill="none">
    <rect x="900" y="120" width="600" height="420"/>
    <line x1="1050" y1="120" x2="1050" y2="540"/>
    <line x1="1200" y1="120" x2="1200" y2="540"/>
    <line x1="1350" y1="120" x2="1350" y2="540"/>
    <line x1="900" y1="260" x2="1500" y2="260"/>
    <line x1="900" y1="400" x2="1500" y2="400"/>
  </g>

  <!-- ceiling cassette mounted in upper grid -->
  <g opacity="0.18" transform="translate(1080 200)">
    <rect x="0" y="0" width="240" height="32" fill="#1A1A1A"/>
    <line x1="60" y1="0" x2="60" y2="32" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="32" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="32" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <line x1="120" y1="80" x2="120" y2="640" stroke="#D8D4CC" stroke-width="1"/>
  <line x1="120" y1="640" x2="700" y2="640" stroke="#D8D4CC" stroke-width="1"/>

  <rect width="1600" height="700" fill="url(#lite3)"/>
  <rect width="1600" height="700" fill="url(#g3)"/>
</svg>