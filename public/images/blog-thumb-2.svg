  </g>
  <g fill="#1A1A1A" opacity="0.3">
    <rect x="500" y="470" width="140" height="70"/>
    <rect x="700" y="470" width="140" height="70"/>
    <rect x="900" y="470" width="140" height="70"/>
  </g>
  <rect width="1200" height="800" fill="url(#b2l)"/>
  <rect width="1200" height="800" fill="url(#b2g)"/>
