<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFDF"/>
      <stop offset="100%" stop-color="#B89F6E"/>
    </linearGradient>
    <radialGradient id="b2l" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="b2g" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#000" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#b2)"/>
  <!-- restaurant section view -->
  <g fill="#1A1A1A" opacity="0.25">
    <rect x="0" y="540" width="1200" height="20"/>
  </g>
  <g stroke="#1A1A1A" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <rect x="200" y="200" width="280" height="60"/>
    <rect x="700" y="200" width="280" height="60"/>
    <line x1="220" y1="225" x2="460" y2="225"/>
    <line x1="720" y1="225" x2="960" y2="225"/>
  </g>
  <!-- ductwork -->
  <g stroke="#1A1A1A" stroke-width="2" fill="none" opacity="0.4">
    <path d="M340 200 L340 130 L840 130 L840 200"/>
    <path d="M340 130 L100 130"/>
    <path d="M840 130 L1100 130"/>
  </g>
  <!-- kitchen -->
  <g fill="#1A1A1A" opacity="0.45">
    <rect x="160" y="430" width="220" height="110"/>
    <rect x="180" y="450" width="80" height="80"/>
