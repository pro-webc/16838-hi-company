<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="paper6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#faf9f6"/>
      <stop offset="100%" stop-color="#ebe6dc"/>
    </linearGradient>
    <radialGradient id="lightR6" cx="78%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain6" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.4" fill="#1a1a1a" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#paper6)"/>
  <rect width="1600" height="900" fill="url(#lightR6)"/>
  <!-- hospital / institutional facility silhouette -->
  <g opacity="0.10" stroke="#1a1a1a" stroke-width="1" fill="none">
    <rect x="880" y="380" width="540" height="400"/>
    <line x1="880" y1="440" x2="1420" y2="440"/>
    <line x1="880" y1="500" x2="1420" y2="500"/>
    <line x1="880" y1="560" x2="1420" y2="560"/>
    <line x1="880" y1="620" x2="1420" y2="620"/>
    <line x1="880" y1="680" x2="1420" y2="680"/>
    <line x1="880" y1="740" x2="1420" y2="740"/>
    <line x1="940" y1="380" x2="940" y2="780"/>
    <line x1="1000" y1="380" x2="1000" y2="780"/>
    <line x1="1060" y1="380" x2="1060" y2="780"/>
    <line x1="1120" y1="380" x2="1120" y2="780"/>
    <line x1="1180" y1="380" x2="1180" y2="780"/>
    <line x1="1240" y1="380" x2="1240" y2="780"/>
    <line x1="1300" y1="380" x2="1300" y2="780"/>
    <line x1="1360" y1="380" x2="1360" y2="780"/>
  </g>
  <!-- multiple outdoor units row -->
  <g opacity="0.13" stroke="#1a1a1a" stroke-width="1.2" fill="none">
    <rect x="1100" y="800" width="100" height="50" rx="2"/>
    <circle cx="1150" cy="825" r="14"/>
    <rect x="1220" y="800" width="100" height="50" rx="2"/>
    <circle cx="1270" cy="825" r="14"/>
    <rect x="1340" y="800" width="100" height="50" rx="2"/>
    <circle cx="1390" cy="825" r="14"/>
  </g>
  <line x1="0" y1="540" x2="1600" y2="540" stroke="#d8d4cc" stroke-width="0.5" stroke-dasharray="2 8"/>
  <line x1="0" y1="800" x2="1600" y2="800" stroke="#d8d4cc" stroke-width="1"/>
  <line x1="860" y1="0" x2="860" y2="900" stroke="#d8d4cc" stroke-width="0.5" stroke-dasharray="2 8"/>
  <rect width="1600" height="900" fill="url(#grain6)"/>
