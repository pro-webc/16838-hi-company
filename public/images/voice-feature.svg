<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ceil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#E0D9C5"/>
    </linearGradient>
    <linearGradient id="wallv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8CFB8"/>
      <stop offset="100%" stop-color="#A89A78"/>
    </linearGradient>
    <radialGradient id="litev" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gv" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#000" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#ceil)"/>
  <rect y="600" width="1600" height="400" fill="url(#wallv)"/>

  <!-- ceiling structural grid (perspective) -->
  <g stroke="#1A1A1A" stroke-width="1" fill="none" opacity="0.18">
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1100" y1="0" x2="1100" y2="600"/>
    <line x1="1400" y1="0" x2="1400" y2="600"/>
  </g>

  <!-- multiple ceiling cassette units -->
  <g fill="#1A1A1A" opacity="0.85">
    <g transform="translate(280 240)">
      <rect width="260" height="180" fill="#2A2A2A"/>
      <rect x="20" y="20" width="220" height="140" fill="#3D3D3D"/>
      <rect x="20" y="20" width="220" height="14" fill="#1A1A1A"/>
      <rect x="20" y="146" width="220" height="14" fill="#1A1A1A"/>
      <line x1="20" y1="50" x2="240" y2="50" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="20" y1="80" x2="240" y2="80" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="20" y1="110" x2="240" y2="110" stroke="#1A1A1A" stroke-width="1"/>
      <circle cx="130" cy="90" r="20" fill="#1A1A1A"/>
      <circle cx="130" cy="90" r="14" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
    </g>
    <g transform="translate(870 220)">
      <rect width="260" height="180" fill="#2A2A2A"/>
      <rect x="20" y="20" width="220" height="140" fill="#3D3D3D"/>
      <rect x="20" y="20" width="220" height="14" fill="#1A1A1A"/>
      <rect x="20" y="146" width="220" height="14" fill="#1A1A1A"/>
      <line x1="20" y1="50" x2="240" y2="50" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="20" y1="80" x2="240" y2="80" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="20" y1="110" x2="240" y2="110" stroke="#1A1A1A" stroke-width="1"/>
      <circle cx="130" cy="90" r="20" fill="#1A1A1A"/>
      <circle cx="130" cy="90" r="14" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
    </g>
  </g>

  <!-- pipework dropping -->
  <g stroke="#1A1A1A" stroke-width="2" fill="none" opacity="0.5">
    <path d="M410 240 L410 140 L640 140"/>
    <path d="M450 240 L450 120 L660 120"/>
    <path d="M1000 220 L1000 140 L1240 140"/>
    <path d="M1040 220 L1040 120 L1260 120"/>
  </g>

  <rect width="1600" height="1000" fill="url(#litev)"/>
  <rect width="1600" height="1000" fill="url(#gv)"/>
</svg>