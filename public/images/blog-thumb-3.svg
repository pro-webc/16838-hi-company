<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D8CFB8"/>
    </linearGradient>
    <radialGradient id="b3l" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFF8E5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF8E5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="b3g" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#000" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#b3)"/>
  <!-- gas cylinder + valve diagram -->
  <g stroke="#1A1A1A" stroke-width="2" fill="none" opacity="0.55">
    <rect x="420" y="200" width="180" height="380" rx="20"/>
    <rect x="450" y="160" width="120" height="40"/>
    <rect x="480" y="120" width="60" height="40"/>
    <line x1="510" y1="120" x2="510" y2="80"/>
    <circle cx="510" cy="80" r="20"/>
    <line x1="490" y1="80" x2="530" y2="80"/>
    <line x1="510" y1="60" x2="510" y2="100"/>
  </g>
  <!-- piping out -->
  <g stroke="#1A1A1A" stroke-width="2" fill="none" opacity="0.5">
    <path d="M530 80 L800 80 L800 300"/>
    <circle cx="800" cy="300" r="40"/>
    <line x1="780" y1="300" x2="820" y2="300"/>
    <line x1="800" y1="280" x2="800" y2="320"/>
  </g>
  <g fill="#1A1A1A" opacity="0.35">
    <rect x="440" y="240" width="140" height="6"/>
    <rect x="440" y="280" width="140" height="6"/>
    <rect x="440" y="320" width="140" height="6"/>
  </g>
  <rect width="1200" height="800" fill="url(#b3l)"/>
  <rect width="1200" height="800" fill="url(#b3g)"/>
</svg>