<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEE8D7"/>
    </linearGradient>
    <radialGradient id="lite4" cx="75%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FFF8E5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF8E5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="g4" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#000" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1600" height="700" fill="url(#bg4)"/>

  <!-- distant skyline of outdoor units -->
  <g opacity="0.10" fill="#1A1A1A">
    <rect x="800" y="430" width="120" height="80"/>
    <rect x="940" y="450" width="100" height="60"/>
    <rect x="1060" y="420" width="140" height="90"/>
    <rect x="1220" y="445" width="110" height="65"/>
    <rect x="1350" y="430" width="130" height="80"/>
  </g>
  <g opacity="0.08" stroke="#1A1A1A" stroke-width="1" fill="none">
    <circle cx="860" cy="470" r="20"/>
    <circle cx="990" cy="480" r="14"/>
    <circle cx="1130" cy="465" r="22"/>
    <circle cx="1275" cy="478" r="16"/>
    <circle cx="1415" cy="470" r="20"/>
  </g>

  <line x1="120" y1="80" x2="120" y2="640" stroke="#D8D4CC" stroke-width="1"/>
  <line x1="120" y1="640" x2="700" y2="640" stroke="#D8D4CC" stroke-width="1"/>

  <rect width="1600" height="700" fill="url(#lite4)"/>
  <rect width="1600" height="700" fill="url(#g4)"/>
</svg>