  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect width="1600" height="900" fill="url(#warm)"/>
  <rect width="1600" height="900" fill="url(#light)"/>
  <rect width="1600" height="900" fill="url(#shadow)"/>
  <rect width="1600" height="900" fill="url(#weave)"/>
