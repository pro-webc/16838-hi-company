<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf6"/>
      <stop offset="55%" stop-color="#faf8f3"/>
      <stop offset="100%" stop-color="#f1ede2"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8f3e6" stop-opacity="0"/>
      <stop offset="60%" stop-color="#f8f3e6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8dfc8" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="light" cx="78%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#fff7e0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff7e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="14%" cy="86%" r="55%">
      <stop offset="0%" stop-color="#8a7e64" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#8a7e64" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.45" fill="#3a2f1c" fill-opacity="0.05"/>
