<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EBE5D6"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8CDB4"/>
      <stop offset="100%" stop-color="#9C8C6B"/>
    </linearGradient>
    <radialGradient id="lightL" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.4" fill="#000" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1600" height="700" fill="url(#wall)"/>
  <rect y="500" width="1600" height="200" fill="url(#floor)"/>

  <!-- ceiling cassette unit silhouette (upper right) -->
  <g opacity="0.16" transform="translate(1080 90)">
    <rect x="0" y="0" width="380" height="40" fill="#1A1A1A"/>
    <rect x="20" y="40" width="340" height="14" fill="#1A1A1A"/>
    <line x1="100" y1="0" x2="100" y2="40" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="190" y1="0" x2="190" y2="40" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="40" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- piping silhouette dropping from ceiling -->
  <g opacity="0.10" stroke="#1A1A1A" stroke-width="2" fill="none">
    <path d="M1180 130 L1180 260 Q1180 280 1200 280 L1340 280"/>
    <path d="M1220 130 L1220 240 Q1220 260 1240 260 L1360 260"/>
  </g>

  <!-- distant horizontal cassette units (mid right) -->
  <g opacity="0.08" transform="translate(900 360)">
    <rect x="0" y="0" width="220" height="22" fill="#1A1A1A"/>
    <rect x="260" y="0" width="220" height="22" fill="#1A1A1A"/>
    <rect x="520" y="0" width="220" height="22" fill="#1A1A1A"/>
  </g>

  <!-- vertical hairline (lower-left anchor support) -->
  <line x1="120" y1="80" x2="120" y2="640" stroke="#D8D4CC" stroke-width="1"/>
  <line x1="120" y1="640" x2="700" y2="640" stroke="#D8D4CC" stroke-width="1"/>

  <!-- subtle large outdoor unit silhouette (far right floor) -->
  <g opacity="0.18" transform="translate(1280 430)">
    <rect x="0" y="0" width="220" height="120" fill="#3D3D3D"/>
    <circle cx="60" cy="60" r="38" fill="#1A1A1A"/>
    <circle cx="60" cy="60" r="32" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="160" cy="60" r="38" fill="#1A1A1A"/>
    <circle cx="160" cy="60" r="32" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <rect width="1600" height="700" fill="url(#lightL)"/>
  <rect width="1600" height="700" fill="url(#grain)"/>
</svg>